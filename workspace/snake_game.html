<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake · Refactored</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        .app { width: 100%; max-width: 520px; padding: 40px 24px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero .eyebrow {
            font-size: 12px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: #86868b; margin-bottom: 8px;
        }
        .hero h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.5px; color: #1d1d1f; line-height: 1.1; }
        .hero h1 span { color: #06c; }
        .hero p { font-size: 16px; font-weight: 400; color: #6e6e73; margin-top: 10px; line-height: 1.5; }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .canvas-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: inset 0 1px 0 rgba(0,0,0,0.02);
        }
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #ffffff;
            touch-action: none;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 8px 0;
            border-bottom: 1px solid #e8e8ed;
            margin-bottom: 20px;
        }
        .stat-item { display: flex; align-items: baseline; gap: 6px; }
        .stat-item .label { font-size: 13px; font-weight: 500; color: #86868b; letter-spacing: 0.3px; }
        .stat-item .value {
            font-size: 28px; font-weight: 700; color: #1d1d1f;
            letter-spacing: -0.5px; font-variant-numeric: tabular-nums;
        }
        .stat-item .value.highlight { color: #06c; }
        .actions { display: flex; gap: 10px; margin-top: 4px; }
        .btn {
            flex: 1; border: none; border-radius: 980px; padding: 12px 20px;
            font-family: 'Inter', -apple-system, sans-serif; font-size: 14px;
            font-weight: 600; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            letter-spacing: 0.2px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #06c; color: #fff; }
        .btn-primary:hover { background: #0055b3; }
        .btn-secondary { background: #e8e8ed; color: #1d1d1f; }
        .btn-secondary:hover { background: #d2d2d7; }
        .btn-danger { background: #ff3b30; color: #fff; }
        .btn-danger:hover { background: #d32f2f; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .keyboard-hint { display: flex; justify-content: center; gap: 6px; margin-top: 20px; flex-wrap: wrap; }
        .keyboard-hint kbd {
            display: inline-flex; align-items: center; justify-content: center;
            background: #f5f5f7; border: 1px solid #d2d2d7; border-radius: 6px;
            padding: 4px 10px; font-family: 'Inter', -apple-system, sans-serif;
            font-size: 12px; font-weight: 500; color: #515154;
            box-shadow: 0 1px 0 #d2d2d7; min-width: 32px;
        }
        .keyboard-hint .hint-text { font-size: 12px; color: #86868b; display: flex; align-items: center; gap: 4px; }
        .touch-controls { display: none; margin-top: 20px; justify-content: center; }
        .dpad { display: grid; grid-template-columns: 64px 64px 64px; grid-template-rows: 64px 64px 64px; gap: 6px; }
        .dpad-btn {
            background: #f5f5f7; border: 1px solid #d2d2d7; border-radius: 16px;
            color: #1d1d1f; font-size: 24px; cursor: pointer; transition: all 0.12s;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .dpad-btn:active { background: #e8e8ed; transform: scale(0.92); }
        .dpad-btn.empty { background: transparent; border: none; cursor: default; pointer-events: none; }
        .overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
            border-radius: 16px; z-index: 10;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .overlay .icon { font-size: 56px; margin-bottom: 12px; }
        .overlay .title { font-size: 22px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.3px; }
        .overlay .sub { font-size: 14px; color: #86868b; margin-top: 6px; }
        .overlay .btn { margin-top: 20px; max-width: 200px; width: 100%; }
        @media (max-width: 480px) {
            .app { padding: 20px 12px; }
            .hero h1 { font-size: 28px; }
            .card { padding: 20px; border-radius: 20px; }
            .stat-item .value { font-size: 22px; }
        }
        @media (pointer: coarse) { .touch-controls { display: flex; } }
    </style>
</head>
<body>
<div class="app">
    <div class="hero">
        <div class="eyebrow">Classic Arcade</div>
        <h1>Snake<span>.</span></h1>
        <p>滑动 · 吞食 · 生长 — 极简经典重现</p>
    </div>
    <div class="card">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="500" height="500"></canvas>
            <div class="overlay active" id="overlay">
                <div class="icon">🐍</div>
                <div class="title" id="overlayTitle">准备开始</div>
                <div class="sub" id="overlaySub">点击按钮或按任意方向键</div>
                <button class="btn btn-primary" id="overlayBtn">开始游戏</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-item"><span class="label">分数</span><span class="value" id="score">0</span></div>
            <div class="stat-item"><span class="label">最高</span><span class="value highlight" id="bestScore">0</span></div>
            <div class="stat-item"><span class="label">长度</span><span class="value" id="length">3</span></div>
            <div class="stat-item"><span class="label">速度</span><span class="value" id="speedLv">1</span></div>
        </div>
        <div class="actions">
            <button class="btn btn-primary" id="startBtn">▶ 开始</button>
            <button class="btn btn-secondary" id="pauseBtn">⏸ 暂停</button>
            <button class="btn btn-danger" id="resetBtn">↻ 重置</button>
        </div>
        <div class="keyboard-hint">
            <span class="hint-text">键盘</span>
            <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>
            <span class="hint-text">或</span>
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
            <span class="hint-text">·</span>
            <kbd>Space</kbd><span class="hint-text">暂停</span>
        </div>
        <div class="touch-controls">
            <div class="dpad">
                <div class="dpad-btn empty"></div>
                <button class="dpad-btn" data-dir="0,-1">▲</button>
                <div class="dpad-btn empty"></div>
                <button class="dpad-btn" data-dir="-1,0">◀</button>
                <button class="dpad-btn" data-dir="0,1">▼</button>
                <button class="dpad-btn" data-dir="1,0">▶</button>
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn empty"></div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * =========================================================================
 *  Snake · Refactored Edition v3
 *  ───────────────────────────────────────────────────────────────────────
 *  架构：CONFIG → Logic (SnakeGame) → Visual (Renderer)
 *                → Controller (GameController) → Events (EventManager)
 *  ───────────────────────────────────────────────────────────────────────
 *  重构亮点：
 *  1. requestAnimationFrame + 时间增量循环 → 替代 setInterval，更平滑
 *  2. 缓动加速曲线，速度过渡更自然
 *  3. 方向输入队列机制，同帧内防多次转向
 *  4. 画布自适应（CSS 保持比例 + 逻辑坐标固定）
 *  5. 代码树精简，消除冗余
 * =========================================================================
 */
"use strict";

// =========================================================================
//  CONFIG  —  所有可调参数集中管理
// =========================================================================
const CFG = Object.freeze({
    GRID: 20,
    CANVAS_SIZE: 500,
    BASE_INTERVAL: 140,       // 初始 tick 间隔 (ms)
    MIN_INTERVAL: 60,         // 最快速度间隔 (ms)
    STEP: 6,                  // 基础加速步长
    ACCEL_EVERY: 10,          // 每吃多少食物加速一次
    SWIPE_THRESHOLD: 20,
    SNAKE_INITIAL: 3,
    STORAGE_KEY: 'snakeBest',
    COLORS: {
        SNAKE_HEAD: '#06c',
        SNAKE_TAIL: '#34c759',
        FOOD: '#ff3b30',
        GRID_LINE: '#f0f0f2',
    },
});

// =========================================================================
//  ENUMS
// =========================================================================
const State = Object.freeze({
    IDLE: 'idle', RUNNING: 'running', PAUSED: 'paused', OVER: 'gameover',
});

const OverlayCfg = Object.freeze({
    [State.IDLE]: {
        icon: '🐍',
        title: (f) => f ? '准备开始' : '已重置',
        sub: (f) => f ? '点击按钮或按任意方向键' : '重新开始一场新对局',
        btn: '开始游戏',
    },
    [State.PAUSED]: {
        icon: '⏸', title: () => '已暂停', sub: () => '按空格键或点击继续', btn: '继续',
    },
    [State.OVER]: {
        icon: (w) => w ? '🏆' : '💫',
        title: (w) => w ? '恭喜通关！🎉' : '游戏结束',
        sub: (s) => `最终得分 ${s}`,
        btn: '再来一局',
    },
});

// =========================================================================
//  UTILITY
// =========================================================================
const rand = (min, max) => Math.floor(Math.random() * (max - min)) + min;
const key = (x, y) => `${x},${y}`;

if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
    };
}

// =========================================================================
//  1.  LOGIC  —  SnakeGame 纯逻辑层
// =========================================================================
class SnakeGame {
    constructor(grid = CFG.GRID) { this.grid = grid; this.reset(); }

    reset() {
        const mid = Math.floor(this.grid / 2);
        this.snake = [
            { x: mid, y: mid },
            { x: mid - 1, y: mid },
            { x: mid - 2, y: mid },
        ];
        this.dir = { x: 1, y: 0 };
        this.nextDir = { x: 1, y: 0 };
        this.score = 0;
        this.food = null;
        this.won = false;
        this.spawnFood();
    }

    tryChangeDir(dx, dy) {
        if (dx === 0 && dy === 0) return false;
        if (this.dir.x === -dx && this.dir.y === -dy) return false;
        this.nextDir = { x: dx, y: dy };
        return true;
    }

    spawnFood() {
        const occ = new Set(this.snake.map(p => key(p.x, p.y)));
        const empty = [];
        for (let y = 0; y < this.grid; y++)
            for (let x = 0; x < this.grid; x++)
                if (!occ.has(key(x, y))) empty.push({ x, y });
        if (empty.length === 0) { this.food = null; this.won = true; return; }
        this.food = empty[rand(0, empty.length)];
    }

    tick() {
        if (this.won) return { ate: false, alive: true, won: true };
        this.dir = { ...this.nextDir };
        const head = this.snake[0];
        const newHead = { x: head.x + this.dir.x, y: head.y + this.dir.y };
        const ate = this.food && newHead.x === this.food.x && newHead.y === this.food.y;
        this.snake.unshift(newHead);
        if (!ate) this.snake.pop();

        const h = this.snake[0];
        if (h.x < 0 || h.x >= this.grid || h.y < 0 || h.y >= this.grid)
            return { ate, alive: false, won: false };
        for (let i = 1; i < this.snake.length; i++)
            if (this.snake[i].x === h.x && this.snake[i].y === h.y)
                return { ate, alive: false, won: false };

        if (ate) {
            this.score++;
            if (this.snake.length === this.grid * this.grid) {
                this.won = true;
                return { ate, alive: true, won: true };
            }
            this.spawnFood();
        }
        return { ate, alive: true, won: false };
    }

    get length() { return this.snake.length; }
}

// =========================================================================
//  2.  VISUAL  —  Renderer 纯渲染层
// =========================================================================
class Renderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.grid = CFG.GRID;
        this.cell = canvas.width / this.grid;
    }

    draw(snake, food, dir) {
        const { ctx, canvas: cvs } = this;
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        this._drawGrid();
        if (food) this._drawFood(food);
        this._drawSnake(snake, dir);
    }

    _drawGrid() {
        const { ctx, cell, grid, canvas: cvs } = this;
        ctx.strokeStyle = CFG.COLORS.GRID_LINE;
        ctx.lineWidth = 1;
        for (let i = 0; i <= grid; i++) {
            ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, cvs.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(cvs.width, i * cell); ctx.stroke();
        }
    }

    _drawFood(food) {
        const { ctx, cell } = this;
        const fx = food.x * cell + cell / 2, fy = food.y * cell + cell / 2, r = cell * 0.35;
        const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, r * 3);
        grad.addColorStop(0, 'rgba(255, 59, 48, 0.10)');
        grad.addColorStop(1, 'rgba(255, 59, 48, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(fx, fy, r * 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = CFG.COLORS.FOOD;
        ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI * 2); ctx.fill();
    }

    _drawSnake(snake, dir) {
        const { ctx, cell } = this;
        const len = snake.length;
        for (let i = 0; i < len; i++) {
            const s = snake[i], x = s.x * cell, y = s.y * cell;
            const pad = 1.5, sz = cell - pad * 2, rad = 5;
            const t = len > 1 ? i / (len - 1) : 0;
            const r = Math.round(0 + t * 52);
            const g = Math.round(180 + t * 75);
            const b = Math.round(255 - t * 155);
            ctx.fillStyle = `rgb(${r}, ${Math.min(255, g)}, ${Math.min(255, b)})`;
            ctx.shadowColor = i === 0 ? 'rgba(0,102,204,0.15)' : 'rgba(0,0,0,0.04)';
            ctx.shadowBlur = i === 0 ? 10 : 4;
            ctx.beginPath(); ctx.roundRect(x + pad, y + pad, sz, sz, rad); ctx.fill();
            ctx.shadowBlur = 0;
            if (i === 0) this._drawEyes(x + cell / 2, y + cell / 2, dir);
        }
    }

    _drawEyes(cx, cy, dir) {
        const { ctx } = this;
        const off = 5, eR = 2.5, pR = 1.2;
        let ex1, ey1, ex2, ey2;
        if (dir.x === 1)      { ex1 = cx + off; ey1 = cy - off; ex2 = cx + off; ey2 = cy + off; }
        else if (dir.x === -1){ ex1 = cx - off; ey1 = cy - off; ex2 = cx - off; ey2 = cy + off; }
        else if (dir.y === -1){ ex1 = cx - off; ey1 = cy - off; ex2 = cx + off; ey2 = cy - off; }
        else                  { ex1 = cx - off; ey1 = cy + off; ex2 = cx + off; ey2 = cy + off; }
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(ex1, ey1, eR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1d1d1f';
        ctx.beginPath(); ctx.arc(ex1, ey1, pR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, pR, 0, Math.PI * 2); ctx.fill();
    }
}

// =========================================================================
//  3.  EVENTS  —  EventManager
// =========================================================================
class EventManager {
    constructor() { this._handlers = []; }
    on(el, ev, handler, opts) {
        el.addEventListener(ev, handler, opts);
        this._handlers.push({ el, ev, handler, opts });
        return this;
    }
    destroy() {
        for (const { el, ev, handler, opts } of this._handlers)
            el.removeEventListener(ev, handler, opts);
        this._handlers = [];
    }
}

// =========================================================================
//  4.  CONTROLLER  —  GameController 控制中枢
// =========================================================================
class GameController {
    constructor() {
        const $ = (id) => document.getElementById(id);
        this.canvas    = $('gameCanvas');
        this.overlay   = $('overlay');
        this.ovTitle   = $('overlayTitle');
        this.ovSub     = $('overlaySub');
        this.ovBtn     = $('overlayBtn');
        this.elScore   = $('score');
        this.elBest    = $('bestScore');
        this.elLength  = $('length');
        this.elSpeed   = $('speedLv');

        this.game     = new SnakeGame(CFG.GRID);
        this.renderer = new Renderer(this.canvas);
        this.events   = new EventManager();

        this.state     = State.IDLE;
        this._rafId    = null;
        this._lastTs   = 0;
        this._interval = CFG.BASE_INTERVAL;
        this._best     = parseInt(localStorage.getItem(CFG.STORAGE_KEY) || '0');
        this._first    = true;
        this._touchPos = { x: 0, y: 0 };
        this._dirQueue = [];

        this._init();
    }

    _init() {
        this.elBest.textContent = this._best;
        this.game.reset();
        this.renderer.draw(this.game.snake, this.game.food, this.game.dir);
        this._showOverlay(State.IDLE);
        this._bindEvents();
    }

    _refreshUI() {
        this.elScore.textContent  = this.game.score;
        this.elLength.textContent = this.game.length;
        this.elBest.textContent   = this._best;
        const lv = Math.floor((CFG.BASE_INTERVAL - this._interval) / CFG.STEP) + 1;
        this.elSpeed.textContent  = Math.max(1, lv);
    }

    _showOverlay(state, extra) {
        const cfg = OverlayCfg[state];
        if (!cfg) return;
        this.overlay.classList.add('active');
        const icon = this.overlay.querySelector('.icon');
        if (state === State.IDLE) {
            icon.textContent = cfg.icon;
            this.ovTitle.textContent = cfg.title(this._first);
            this.ovSub.textContent   = cfg.sub(this._first);
            this.ovBtn.textContent   = cfg.btn;
        } else if (state === State.PAUSED) {
            icon.textContent = cfg.icon;
            this.ovTitle.textContent = cfg.title();
            this.ovSub.textContent   = cfg.sub();
            this.ovBtn.textContent   = cfg.btn;
        } else if (state === State.OVER) {
            const won = extra && extra.won;
            icon.textContent = cfg.icon(won);
            this.ovTitle.textContent = cfg.title(won);
            this.ovSub.textContent   = cfg.sub(this.game.score);
            this.ovBtn.textContent   = cfg.btn;
        }
    }

    _hideOverlay() { this.overlay.classList.remove('active'); }

    _loop(now) {
        if (this.state !== State.RUNNING) { this._rafId = null; return; }

        const elapsed = now - this._lastTs;
        if (elapsed >= this._interval) {
            this._lastTs = now - (elapsed % this._interval);

            if (this._dirQueue.length > 0) {
                const d = this._dirQueue.pop();
                this._dirQueue = [];
                this.game.tryChangeDir(d.x, d.y);
            }

            const result = this.game.tick();
            if (!result.alive || result.won) { this._onGameOver(result.won); return; }

            if (result.ate) {
                this._refreshUI();
                if (this.game.score % CFG.ACCEL_EVERY === 0 && this._interval > CFG.MIN_INTERVAL) {
                    const t = (CFG.BASE_INTERVAL - this._interval) / (CFG.BASE_INTERVAL - CFG.MIN_INTERVAL);
                    this._interval = Math.max(CFG.MIN_INTERVAL, this._interval - CFG.STEP * (1 - t * 0.5));
                }
            }
            this.renderer.draw(this.game.snake, this.game.food, this.game.dir);
        }
        this._rafId = requestAnimationFrame((t) => this._loop(t));
    }

    _startLoop() {
        if (this._rafId) cancelAnimationFrame(this._rafId);
        this._lastTs = performance.now();
        this._rafId = requestAnimationFrame((t) => this._loop(t));
    }

    _stopLoop() {
        if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    }

    _onGameOver(won) {
        this._stopLoop();
        if (this.game.score > this._best) {
            this._best = this.game.score;
            this.elBest.textContent = this._best;
            localStorage.setItem(CFG.STORAGE_KEY, String(this._best));
        }
        this._refreshUI();
        this.state = State.OVER;
        this._showOverlay(State.OVER, { won });
        this.renderer.draw(this.game.snake, this.game.food, this.game.dir);
    }

    start() {
        if (this.state === State.RUNNING) return;
        if (this.state === State.OVER || this.state === State.IDLE) {
            this.game.reset();
            this._interval = CFG.BASE_INTERVAL;
            this._first = false;
            this._dirQueue = [];
            this._refreshUI();
        }
        this.state = State.RUNNING;
        this._hideOverlay();
        this._startLoop();
        this.renderer.draw(this.game.snake, this.game.food, this.game.dir);
    }

    togglePause() {
        if (this.state === State.RUNNING) {
            this.state = State.PAUSED;
            this._stopLoop();
            this._showOverlay(State.PAUSED);
        } else if (this.state === State.PAUSED) {
            this.state = State.RUNNING;
            this._hideOverlay();
            this._startLoop();
            this.renderer.draw(this.game.snake, this.game.food, this.game.dir);
        }
    }

    reset() {
        this._stopLoop();
        this.game.reset();
        this._interval = CFG.BASE_INTERVAL;
        this._dirQueue = [];
        this._refreshUI();
        this.state = State.IDLE;
        this._showOverlay(State.IDLE);
        this.renderer.draw(this.game.snake, this.game.food, this.game.dir);
    }

    inputDir(dx, dy) {
        if (this.state === State.IDLE || this.state === State.OVER) this.start();
        if (this.state !== State.RUNNING) return;
        this._dirQueue.push({ x: dx, y: dy });
        if (this._dirQueue.length > 2) this._dirQueue.shift();
    }

    _bindEvents() {
        const ev = this.events;

        ev.on(document, 'keydown', (e) => {
            const map = {
                'ArrowUp': [0, -1], 'w': [0, -1], 'W': [0, -1],
                'ArrowDown': [0, 1], 's': [0, 1], 'S': [0, 1],
                'ArrowLeft': [-1, 0], 'a': [-1, 0], 'A': [-1, 0],
                'ArrowRight': [1, 0], 'd': [1, 0], 'D': [1, 0],
            };
            if (map[e.key]) { e.preventDefault(); this.inputDir(map[e.key][0], map[e.key][1]); }
            else if (e.key === ' ') { e.preventDefault(); this.togglePause(); }
        });

        ev.on(document.getElementById('startBtn'), 'click', () => this.start());
        ev.on(document.getElementById('pauseBtn'), 'click', () => this.togglePause());
        ev.on(document.getElementById('resetBtn'), 'click', () => this.reset());

        ev.on(this.ovBtn, 'click', () => {
            if (this.state === State.IDLE || this.state === State.OVER) this.start();
            else if (this.state === State.PAUSED) this.togglePause();
        });

        document.querySelectorAll('[data-dir]').forEach(btn => {
            ev.on(btn, 'click', () => {
                const [dx, dy] = btn.dataset.dir.split(',').map(Number);
                this.inputDir(dx, dy);
            });
        });

        ev.on(this.canvas, 'touchstart', (e) => {
            const t = e.touches[0];
            this._touchPos = { x: t.clientX, y: t.clientY };
        }, { passive: true });

        ev.on(this.canvas, 'touchend', (e) => {
            const t = e.changedTouches[0];
            const dx = t.clientX - this._touchPos.x;
            const dy = t.clientY - this._touchPos.y;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < CFG.SWIPE_THRESHOLD) return;
            if (Math.abs(dx) > Math.abs(dy)) this.inputDir(dx > 0 ? 1 : -1, 0);
            else this.inputDir(0, dy > 0 ? 1 : -1);
        }, { passive: true });

        ev.on(this.canvas, 'touchmove', (e) => e.preventDefault(), { passive: false });
    }

    destroy() { this._stopLoop(); this.events.destroy(); }
}

document.addEventListener('DOMContentLoaded', () => {
    const ctrl = new GameController();
    if (window.__DEV__) window.controller = ctrl;
});
</script>
